name: CI/CD Pipeline

on:
  push:
    branches: [main] # Automatically trigger the pipeline when code is pushed to the main branch

jobs:
  # Job 1: Build Test (The Continuous Integration part)
  # This job ensures that your Dockerfile is valid and the app can build without errors.
  test-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4 # Downloads your code to the GitHub runner

      - name: Build Check
        run: |
          echo "Starting Build Test..."
          # This simulates a production build to catch errors before actual deployment
          docker build -t backend-test . 
          echo "Build Successful!"

  # Job 2: Deployment (The Continuous Deployment part)
  # This job only starts if the 'test-build' job finishes successfully.
  deploy:
    needs: test-build # Prevents deployment if the build test fails
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm i -g @railway/cli # Installs the Railway tool to communicate with your hosting

      - name: Deploy to Railway
        # Ensure --service matches your Railway service name (e.g., Course_Master_Backend)
        run: railway up --service Course_Master_Backend --detach
        env:
          # Authenticates the runner using your stored Railway Project Token
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN_SECRET }}
